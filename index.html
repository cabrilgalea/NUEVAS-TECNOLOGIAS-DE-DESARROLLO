<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./estilos.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Arvo:ital,wght@0,400;0,700;1,400;1,700&family=Cabin:ital,wght@0,400..700;1,400..700&family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet"/>
    <title>Undergrade Distance</title>
  </head>
  <body>
    <header class="header-Principal">
      <!-- Menú -->
      <nav class="menu">
        <ul>
          <li>Undergrade Distance</li>
        </ul>
      </nav>
      <!-- Redes Sociales -->
      <div class="enter-container">
        <div class="icons">
          <a href="https://facebook.com" target="_blank"
            ><i class="fa-brands fa-facebook"></i
          ></a>
          <a href="https://instagram.com" target="_blank"
            ><i class="fa-brands fa-instagram"></i
          ></a>
          <a href="https://twitter.com" target="_blank"
            ><i class="fa-brands fa-twitter"></i
          ></a>
          <a href="https://linkedin.com" target="_blank"
            ><i class="fa-brands fa-linkedin"></i
          ></a>
        </div>
      </div>
    </header>
    <div class="logo">
      <img src="./img/icono.jpeg" alt="logo Pagina" />
    </div>

    <nav class="menu-pri">
      <ul>
        <li><a href="#Preg Distance">Preg Distance</a></li>
      </ul>
    </nav>

    <nav class="menu-seg">
      <ul>
        <li><a href="#Idioma">Idioma</a></li>
        <li><a href="#Horario de Atencion">Horario de Atencion</a></li>
        <li><a href="#Soporte Tecnico">Soporte Tecnico</a></li>
      </ul>
    </nav>
    <section class="login-section">
      <!-- Imagen con texto -->
      <div class="banner">
        <img src="./img/FONDO.jpeg" alt="Aulas Virtuales Uniminuto" />
        <div class="banner-text">
          <h2>
            Aulas virtuales <br />
            Uniminuto
          </h2>
        </div>
      </div>

      <!-- Tarjeta de login -->
      <section class="login">
        <h3>INICIO DE SESION</h3>
        <form>
          <div class="input-group">
            <i class="fa-solid fa-user"></i>
            <input type="text" placeholder="Usuario" required />
          </div>
          <div class="input-group">
            <i class="fa-solid fa-lock"></i>
            <input type="password" placeholder="Contraseña" required />
          </div>
          <a href="#" class="forgot">¿Olvidaste tu Contraseña?</a>
          <button type="submit" class="btn-login">Ingresar</button>
        </form>
      </section>
    </section>

    <script src="./js/main.js">
    
    </script>
  </body>
  <footer></footer>
  <link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css"
  />
</html>
